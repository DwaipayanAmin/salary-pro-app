name: blue_collar_tracker
description: A native production-ready Flutter app for Blue-Collar and Gig workers with Clean Architecture, Riverpod, SQLite, and Material 3.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.3

  # Database & Local Persistence (Offline-First)
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  path: ^1.9.0
  shared_preferences: ^2.2.2

  # UI & Visuals (Material 3)
  google_fonts: ^6.1.0
  fl_chart: ^0.66.0
  intl: ^0.19.0
  lucide_icons: ^0.300.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
